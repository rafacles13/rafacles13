<title>Sobrevivência</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

/* faixa verde */
.topo{
    background:#2ecc71;
    color:white;
    text-align:center;
    padding:25px;
    font-size:32px;
    font-weight:bold;
}

/* seção */
.secao{
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* video responsivo */
.video{
    position:relative;
    padding-bottom:56.25%;
    height:0;
    overflow:hidden;
}

.video iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

/* galeria de imagens */
.galeria{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

.galeria img{
    width:calc(33% - 10px);
    border-radius:6px;
}
</style>

</head>

<div class="topo">
